<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FlowWatch</title>
    <link rel="stylesheet" href="record.css">
    <link rel="stylesheet" href="vendor/cal-heatmap.css">
    <script src="vendor/d3.v7.min.js"></script>
    <script src="vendor/cal-heatmap.min.js"></script>
    <script src="vendor/Tooltip.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (chrome && chrome.runtime && chrome.runtime.openOptionsPage) {
          chrome.runtime.openOptionsPage();
          window.close();
        }
      });
    </script>
</head>

<body>
    <h1>Options</h1>
    <div class="timer-controls">
      <input id="intention_input" placeholder="What will you focus on?" />
      <button id="start_focus_button">Start Focus</button>
      <button id="end_flow_button">End Flow</button>
      <button id="reset_button">Reset</button>
      <span id="timer_display">00:00</span>
    </div>

    <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="playAudioToggle">
            <span class="slider round"></span>
        </label>
        <span id="toggleLabel">Generated Audio</span>
    </div>

    <div class="calendar-controls">
        <div class="view-toggle">
            <button id="weekView" class="view-button active">Year View</button>
            <button id="monthView" class="view-button">Month View</button>
        </div>
    </div>
    <div id="cal-heatmap"></div>
    <div class="navigation">
        <button id="prevButton" aria-label="Previous">&#8592;</button>
        <button id="nextButton" aria-label="Next">&#8594;</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
