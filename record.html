<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FlowWatch Records</title>
    <link rel="stylesheet" href="record.css">
    <script src="vendor/d3.v7.min.js"></script>
    <link rel="stylesheet" href="vendor/cal-heatmap.css">
    <script src="vendor/cal-heatmap.min.js"></script>
</head>

<body>
    <h1>Options</h1>
    <section class="settings-group" aria-labelledby="timer-settings-heading">
      <h2 id="timer-settings-heading">Timer</h2>
      <div class="option">
        <label for="focusMinutesInput">Focus length (minutes)</label>
        <input id="focusMinutesInput" type="number" min="1" step="1" value="15">
      </div>
    </section>

    <section class="settings-group" aria-labelledby="audio-settings-heading">
      <h2 id="audio-settings-heading">Generated audio</h2>
      <div class="switch-container">
          <label class="switch">
              <input type="checkbox" id="playAudioToggle">
              <span class="slider round"></span>
          </label>
          <span class="toggle-label">Play focus and relax music</span>
      </div>
      <div class="option">
        <label for="focusHzInput">Focus modulation (12–16 Hz)</label>
        <input id="focusHzInput" type="number" min="12" max="16" step="0.1" value="16">
      </div>
      <div class="option">
        <label for="relaxHzInput">Relax modulation (8–12 Hz)</label>
        <input id="relaxHzInput" type="number" min="8" max="12" step="0.1" value="10">
      </div>
      <div class="option">
        <label for="musicStyleSelect">Musical style</label>
        <select id="musicStyleSelect">
          <option value="ambient">Ambient</option>
          <option value="classical">Classical</option>
          <option value="baroque">Baroque</option>
        </select>
      </div>
      <div class="option">
        <label for="instrumentSelect">Instrument</label>
        <select id="instrumentSelect">
          <option value="existing">Existing synth</option>
          <option value="piano">Piano</option>
          <option value="harpsichord">Harpsichord</option>
        </select>
      </div>
    </section>
    <div class="switch-container">
      <label class="switch">
        <input type="checkbox" id="promptIntentionToggle">
        <span class="slider round"></span>
      </label>
      <span class="toggle-label">Ask for intention on start</span>
    </div>
    <div class="calendar-controls">
        <div class="view-toggle">
            <button id="weekView" class="view-button active">Year View</button>
            <button id="monthView" class="view-button">Month View</button>
        </div>
    </div>
    <div id="cal-heatmap"></div>
    <div class="navigation">
        <button id="prevButton" aria-label="Previous">&#8592;</button>
        <button id="nextButton" aria-label="Next">&#8594;</button>
    </div>
    <script src="record.js"></script>
</body>

</html>
